<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>White Rabbit Foundation</title>
  <style>
    :root {
      --bg: #0a0d10;
      --panel: #11161c;
      --panel-2: #151c24;
      --border: rgba(255,255,255,0.08);
      --text: #e8edf2;
      --muted: #8d98a5;
      --alert: #8ee6ff;
      --shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #090c10, #0d1117);
      color: var(--text);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 13, 16, 0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }

    .topbar {
      max-width: 1400px;
      margin: 0 auto;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand-title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .brand-subtitle {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .header-controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-input {
      width: 280px;
      max-width: 100%;
      padding: 10px 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      outline: none;
    }

    .search-input::placeholder {
      color: var(--muted);
    }

    .btn {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.6px;
    }

    .layout {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 20px;
    }

    .sidebar {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      height: fit-content;
      box-shadow: var(--shadow);
    }

    .sidebar h3 {
      margin-top: 0;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .filter-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .filter-btn {
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 10px;
      text-align: left;
      cursor: pointer;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    .filter-btn.active {
      outline: 1px solid var(--alert);
      color: var(--alert);
    }

    .main {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .statusbar {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      box-shadow: var(--shadow);
      color: var(--muted);
      font-size: 14px;
    }

    .feed-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .feed-title h2 {
      margin: 0;
      font-size: 16px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .live-indicator {
      color: var(--alert);
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .feed-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 16px;
    }

    .intel-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
    }

    .intel-thumb {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: #0f141a;
      border-bottom: 1px solid var(--border);
    }

    .intel-body {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }

    .intel-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .intel-source,
    .intel-tag {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 5px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel-2);
    }

    .intel-source {
      color: var(--alert);
    }

    .intel-tag {
      color: var(--muted);
    }

    .intel-title {
      margin: 0;
      font-size: 16px;
      line-height: 1.35;
    }

    .intel-title a {
      color: var(--text);
      text-decoration: none;
    }

    .intel-title a:hover {
      color: var(--alert);
    }

    .intel-actions {
      margin-top: auto;
      display: flex;
      justify-content: flex-end;
    }

    .open-file {
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--border);
      background: var(--panel-2);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .open-file:hover {
      color: var(--alert);
      border-color: var(--alert);
    }

    @media (max-width: 960px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        order: 2;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <div class="brand-title">White Rabbit Foundation</div>
        <div class="brand-subtitle">Archive // Intelligence // Anomalies</div>
      </div>

      <div class="header-controls">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Search archive..."
        />
        <button class="btn" id="refreshBtn">Refresh</button>
      </div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <h3>Feed Filters</h3>
      <div class="filter-list" id="filterList">
        <button class="filter-btn active" data-source="all">All Intel</button>
        <button class="filter-btn" type="button" onclick="window.location.href='/events.html'">Events</button>
        <button class="filter-btn" data-source="vault">Vault</button>
      </div>
    </aside>

    <main class="main">
      <div class="statusbar">
        <div class="feed-title">
          <h2>Live Intel Feed</h2>
          <div class="live-indicator">● Live Monitoring</div>
        </div>
        <div id="status">Loading archived intelligence...</div>
      </div>

      <div class="feed-grid" id="articles"></div>
    </main>
  </div>

  <script>
    const API_URL = '/api/scrape';
    const statusEl = document.getElementById('status');
    const articlesEl = document.getElementById('articles');
    const searchInput = document.getElementById('searchInput');
    const refreshBtn = document.getElementById('refreshBtn');
    let allArticles = [];

    function safeText(str) {
      return (str || '').replace(/\s+/g, ' ').trim();
    }

    function escapeHtml(str = '') {
      return str.replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      })[char]);
    }

    function getCategoryFromTitle(title = '') {
      const t = title.toLowerCase();

      if (t.includes('ai') || t.includes('artificial intelligence') || t.includes('chatgpt') || t.includes('openai') || t.includes('robot')) return 'AI';
      if (t.includes('ufo') || t.includes('uap') || t.includes('alien')) return 'UAP';
      if (t.includes('ancient') || t.includes('civilization') || t.includes('pyramid')) return 'Ancient';
      if (t.includes('ghost') || t.includes('haunted') || t.includes('paranormal')) return 'Paranormal';
      if (t.includes('conspiracy') || t.includes('secret') || t.includes('classified')) return 'Conspiracy';
      if (t.includes('health') || t.includes('virus') || t.includes('vaccine')) return 'Health';
      if (t.includes('war') || t.includes('military') || t.includes('pentagon')) return 'Intel';
      return 'Intel';
    }

    function getFallbackImage(article) {
      const title = (article.title || '').toLowerCase();

      if (
        title.includes('ai') ||
        title.includes('artificial intelligence') ||
        title.includes('chatgpt') ||
        title.includes('openai') ||
        title.includes('robot') ||
        title.includes('machine learning')
      ) {
        return '/images/ai.jpg';
      }

      if (title.includes('ufo') || title.includes('uap') || title.includes('alien')) {
        return '/images/ufo.jpg';
      }

      if (title.includes('ancient') || title.includes('civilization') || title.includes('pyramid')) {
        return '/images/ancient civilization.jpg';
      }

      if (title.includes('ghost') || title.includes('haunted') || title.includes('paranormal')) {
        return '/images/paranormal.jpg';
      }

      if (
        title.includes('conspiracy') ||
        title.includes('secret') ||
        title.includes('classified') ||
        title.includes ('world') ||
        title.includes('society')
      ) {
        return '/images/conspiracy.jpg';
      }

      if (
        title.includes('health') ||
        title.includes('virus') ||
        title.includes('vaccine')
      ) {
        return '/images/health.jpg';
      }

      return '/images/health2.jpg';
    }

    function renderArticles(articles) {
      articlesEl.innerHTML = '';

      if (!articles.length) {
        statusEl.textContent = 'No matching intelligence found.';
        return;
      }

      statusEl.innerHTML = `Loaded <b>${articles.length}</b> briefing(s).`;

      articles.forEach(article => {
        const card = document.createElement('div');
        card.className = 'intel-card';

        const title = safeText(article.title);
        const link = article.link || '#';
        const source = safeText(article.source || 'Unknown');
        const thumb = article.thumbnail || getFallbackImage(article);
        const tag = getCategoryFromTitle(title);

        card.innerHTML = `
          <img class="intel-thumb" src="${escapeHtml(thumb)}" alt="thumbnail">
          <div class="intel-body">
            <div class="intel-meta">
              <span class="intel-source">${escapeHtml(source)}</span>
              <span class="intel-tag">${escapeHtml(tag)}</span>
            </div>
            <h3 class="intel-title">
              <a href="${escapeHtml(link)}" target="_blank" rel="noopener noreferrer">${escapeHtml(title)}</a>
            </h3>
            <div class="intel-actions">
              <a class="open-file" href="${escapeHtml(link)}" target="_blank" rel="noopener noreferrer">Open File</a>
            </div>
          </div>
        `;

        const imgEl = card.querySelector('.intel-thumb');
        imgEl.addEventListener('error', function () {
          this.src = getFallbackImage(article);
        });

        articlesEl.appendChild(card);
      });
    }

    function applyFilters() {
      const query = searchInput.value.toLowerCase().trim();

      const filtered = allArticles.filter(article => {
        const title = (article.title || '').toLowerCase();
        const source = (article.source || '').toLowerCase();
        const matchesSearch = title.includes(query) || source.includes(query);

        return matchesSearch;
      });

      renderArticles(filtered);
    }

    async function loadArticles() {
      try {
        statusEl.textContent = 'Loading archived intelligence...';
        articlesEl.innerHTML = '';

        const res = await fetch(API_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        allArticles = data;
        applyFilters();
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'Error loading intelligence feed.';
      }
    }

    searchInput.addEventListener('input', applyFilters);

    refreshBtn.addEventListener('click', loadArticles);

    loadArticles();
  </script>
</body>
</html>
