<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>News Aggregator</title>

  <style>
    :root{
      --bg: #f7f7f8;
      --text: #111;
      --muted: #666;
      --card: #ffffff;
      --border: rgba(0,0,0,0.08);
      --shadow: 0 6px 18px rgba(0,0,0,0.08);
      --link: #0b66ff;
      --btn: #111;
      --btnText: #fff;
      --chip: rgba(0,0,0,0.06);
    }

    body.dark{
      --bg: #0b0f14;
      --text: #e7eaf0;
      --muted: #a8b0bd;
      --card: #121826;
      --border: rgba(255,255,255,0.10);
      --shadow: 0 10px 24px rgba(0,0,0,0.45);
      --link: #7db3ff;
      --btn: #e7eaf0;
      --btnText: #0b0f14;
      --chip: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; }
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header{
      position: sticky;
      top:0;
      z-index: 50;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
    }

    .topbar{
      max-width: 1200px;
      margin: 0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .brand h1{
      font-size: 18px;
      margin:0;
      letter-spacing: 0.2px;
    }

    .controls{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .btn{
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      padding: 9px 12px;
      border-radius: 10px;
      cursor:pointer;
      box-shadow: none;
      display:flex;
      align-items:center;
      gap:8px;
      font-weight: 600;
    }
    .btn:hover{ filter: brightness(0.98); }

    .toggle{
      border: none;
      background: var(--btn);
      color: var(--btnText);
      padding: 9px 12px;
      border-radius: 10px;
      cursor:pointer;
      font-weight: 700;
      display:flex;
      align-items:center;
      gap:8px;
    }

    main{
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
    }

    .status{
      padding: 10px 12px;
      background: var(--chip);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .card{
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow:hidden;
      box-shadow: var(--shadow);
      display:flex;
      flex-direction: column;
      min-height: 320px;
    }

    .thumb{
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: var(--chip);
    }

    .content{
      padding: 12px 12px 14px;
      display:flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .source{
      display:inline-flex;
      align-items:center;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .title{
      font-size: 15px;
      font-weight: 800;
      line-height: 1.25;
      margin:0;
    }

    .title a{
      color: var(--text);
      text-decoration: none;
    }
    .title a:hover{
      color: var(--link);
      text-decoration: underline;
    }

    .metaRow{
      margin-top: auto;
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 10px;
    }

    .open{
      font-size: 13px;
      font-weight: 700;
      color: var(--link);
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
    }
    .open:hover{ filter: brightness(1.05); }

    .count{
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <header>
    <div class="topbar">
      <div class="brand">
        <h1>📰 White Rabbit Foundation</h1>
      </div>

      <div class="controls">
        <button class="btn" id="refreshBtn" title="Refresh articles">↻ Refresh</button>
        <button class="toggle" id="themeBtn" title="Toggle dark mode">🌙 Dark</button>
      </div>
    </div>
  </header>

  <main>
    <div class="status" id="status">Loading articles...</div>
    <div class="grid" id="articles"></div>
  </main>

  <script>
    const API_URL = '/api/scrape';

    const statusEl = document.getElementById('status');
    const container = document.getElementById('articles');
    const themeBtn = document.getElementById('themeBtn');
    const refreshBtn = document.getElementById('refreshBtn');

    // ----------------------------
    // Dark mode toggle + persistence
    // ----------------------------
    function setTheme(isDark) {
      document.body.classList.toggle('dark', isDark);
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      themeBtn.textContent = isDark ? '☀️ Light' : '🌙 Dark';
    }

    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') setTheme(true);
    else setTheme(false);

    themeBtn.addEventListener('click', () => {
      const isDark = !document.body.classList.contains('dark');
      setTheme(isDark);
    });

    // ----------------------------
    // Render
    // ----------------------------
    function safeText(str) {
      return (str || '').replace(/\s+/g, ' ').trim();
    }

    function renderArticles(articles) {
      container.innerHTML = '';
      if (!articles || articles.length === 0) {
        statusEl.textContent = 'No articles found.';
        return;
      }

      statusEl.innerHTML = `Loaded <b>${articles.length}</b> articles.`;

      articles.forEach(a => {
        const title = safeText(a.title);
        const link = a.link || '#';
        const source = safeText(a.source || 'Unknown');
        const thumb = a.thumbnail || '';

        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
          <img class="thumb" src="${thumb}" alt="thumbnail" loading="lazy"
               onerror="this.onerror=null; this.src='https://via.placeholder.com/600x400?text=No+Image';">
          <div class="content">
            <div class="source">${source}</div>
            <h3 class="title">
              <a href="${link}" target="_blank" rel="noopener noreferrer">${title}</a>
            </h3>
            <div class="metaRow">
              <a class="open" href="${link}" target="_blank" rel="noopener noreferrer">Open ↗</a>
              <span class="count"> </span>
            </div>
          </div>
        `;

        container.appendChild(card);
      });
    }

    // ----------------------------
    // Load articles
    // ----------------------------
    async function loadArticles() {
      try {
        statusEl.textContent = 'Loading articles...';
        container.innerHTML = '';

        const res = await fetch(API_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        renderArticles(data);
      } catch (err) {
        console.error(err);
        statusEl.innerHTML = `<span style="color:#ff6b6b;font-weight:700;">Error loading articles.</span> Make sure your server is running on port 3000.`;
      }
    }

    refreshBtn.addEventListener('click', loadArticles);

    loadArticles();
  </script>
</body>
</html>
